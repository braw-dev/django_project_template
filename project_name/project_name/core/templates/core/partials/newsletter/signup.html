{% load i18n %}

    {% blocktrans %}Occasional product updates and marketing emails, only after email confirmation.{% endblocktrans %}
</p>
<div class="mt-6">
    <a href="{% url 'newsletter:signup' %}"
       class="inline-flex items-center justify-center rounded-md bg-indigo-500 px-3 py-2 text-sm font-semibold text-white shadow-sm hover:bg-indigo-400 focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-indigo-500">

    </a>
</div>
