{% load allauth i18n %}
<form method="{{ attrs.method }}" action="{{ attrs.action }}" class="allauth-form">
    {% if attrs.form.non_field_errors %}
        {% include "partials/form-errors.html" with form=attrs.form %}
    {% endif %}
    {% slot body %}
    {% endslot %}
    {% slot actions %}
    {% endslot %}
</form>
