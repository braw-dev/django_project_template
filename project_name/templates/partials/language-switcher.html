{% load i18n %}
<form action="{% url 'set_language' %}" method="post" class="ui-control-group">
    {% csrf_token %}
    <input name="next" type="hidden" value="{{ redirect_to|default:request.get_full_path }}">
    <label for="language-switcher" class="ui-sr-only">{% trans "Language" %}</label>
    <select id="language-switcher" name="language" class="ui-select">
        {% get_current_language as CURRENT_LANG %}
        {% get_available_languages as LANGUAGES %}
        {% get_language_info_list for LANGUAGES as languages %}
        {% for language in languages %}
            <option value="{{ language.code }}"
                    {% if language.code in CURRENT_LANG %}selected{% endif %}>{{ language.name_local }}</option>
        {% endfor %}
    </select>
    <button type="submit" class="ui-button ui-button--outline">{% trans "Apply" %}</button>
</form>
