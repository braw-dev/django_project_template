<!DOCTYPE html>
<html lang="en">
  <body style="margin:0;padding:0;background:#f5f5f5;color:#111827;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;">
    <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="background:#f5f5f5;padding:24px 0;">
      <tr>
        <td align="center">
          <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="max-width:600px;background:#ffffff;border-radius:12px;overflow:hidden;">
            <tr>
              <td style="padding:32px 32px 16px 32px;font-size:24px;font-weight:700;color:#111827;">
                {{ project_display_name }}
              </td>
            </tr>
            <tr>
              <td style="padding:0 32px 24px 32px;font-size:16px;line-height:1.6;color:#111827;">
                {% block email_body %}{% endblock %}
              </td>
            </tr>
            <tr>
              <td style="padding:16px 32px 32px 32px;font-size:14px;line-height:1.5;color:#6b7280;border-top:1px solid #e5e7eb;">
                {{ project_display_name }}
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
