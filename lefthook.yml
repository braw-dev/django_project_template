pre-commit:
  parallel: true
  commands:
    gitleaks:
      glob: "*"
      run: gitleaks protect --staged --no-banner
    ruff-format:
      run: uv run ruff format {staged_files}
      stage_fixed: true
      glob:
        - "*.py"
        - "*.py-tpl"
    ruff-check:
      run: uv run ruff check --fix {staged_files}
      stage_fixed: true
      glob:
        - "*.py"
        - "*.py-tpl"
      exclude:
        - "**/migrations/*.py"
    format-django-templates:
      run: uv run djade {staged_files}
      stage_fixed: true
      glob:
        - "*.html"
        - "*.html-tpl"
    markdown-format:
      run: uv run rumdl check --fix {staged_files}
      stage_fixed: true
      glob:
        - "*.md"
      exclude:
        - "ai/**"
        - ".specify/**"
        - ".cursor/**"
        - ".claude/**"
