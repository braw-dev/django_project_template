name: CI

on:
    push:
        branches:
            - main
            - develop
    pull_request:

jobs:
    secrets:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Gitleaks
              uses: gitleaks/gitleaks-action@v2
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    test:
        runs-on: ubuntu-latest
        services:
            cache:
                image: docker.dragonflydb.io/dragonflydb/dragonfly
                ports:
                    - 6379:6379
        env:
            GENERATED_PROJECT_NAME: ci_test_project
        steps:
            - uses: actions/checkout@v4

            - name: Set up Python
              uses: actions/setup-python@v5
              with:
                  python-version: "3.13"

            - name: Install uv
              uses: astral-sh/setup-uv@v4

            - name: Set up Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "24"

            - name: Enable corepack
              run: corepack enable

            - name: Generate test project
              run: |
                  GENERATED_PROJECT_DIR="$(uv run python dev/create_test_project.py \
                    --project-name "$GENERATED_PROJECT_NAME" \
                    --output-dir "$RUNNER_TEMP/generated-project")"
                  echo "GENERATED_PROJECT_DIR=$GENERATED_PROJECT_DIR" >> "$GITHUB_ENV"

            - name: Sync Python dependencies
              working-directory: ${{ env.GENERATED_PROJECT_DIR }}
              run: uv sync --frozen --python 3.13

            - name: Install frontend deps
              working-directory: ${{ env.GENERATED_PROJECT_DIR }}/frontend/${{ env.GENERATED_PROJECT_NAME }}
              run: pnpm install --frozen-lockfile

            - name: Install Playwright deps
              working-directory: ${{ env.GENERATED_PROJECT_DIR }}/${{ env.GENERATED_PROJECT_NAME }}/tests/e2e
              run: |
                  pnpm install --frozen-lockfile
                  pnpm exec playwright install --with-deps

            - name: Validate AI instruction links
              run: uv run python dev/check_ai_links.py

            - name: Ruff lint
              working-directory: ${{ env.GENERATED_PROJECT_DIR }}
              run: uv run ruff check .

            - name: Ruff format check
              working-directory: ${{ env.GENERATED_PROJECT_DIR }}
              run: uv run ruff format --check .

            - name: djlint
              working-directory: ${{ env.GENERATED_PROJECT_DIR }}
              run: uv run djlint $GENERATED_PROJECT_NAME/templates --check

            - name: ty
              working-directory: ${{ env.GENERATED_PROJECT_DIR }}
              run: uv run ty check $GENERATED_PROJECT_NAME --exclude '**/migrations/*.py' --exclude '**/tests.py' --exclude '**/test_*.py' --exclude '**/tests/**/*.py' --exclude '**/settings.py'

            - name: pytest
              working-directory: ${{ env.GENERATED_PROJECT_DIR }}
              run: uv run pytest

            - name: Run migrations
              working-directory: ${{ env.GENERATED_PROJECT_DIR }}/${{ env.GENERATED_PROJECT_NAME }}
              run: uv run python manage.py migrate

            - name: Start Django server
              working-directory: ${{ env.GENERATED_PROJECT_DIR }}/${{ env.GENERATED_PROJECT_NAME }}
              run: |
                  uv run python manage.py runserver 0.0.0.0:8000 &
                  echo $! > django.pid
                  sleep 5

            - name: Playwright tests
              working-directory: ${{ env.GENERATED_PROJECT_DIR }}/${{ env.GENERATED_PROJECT_NAME }}/tests/e2e
              env:
                  E2E_BASE_URL: http://127.0.0.1:8000
              run: pnpm test

            - name: Stop Django server
              if: always()
              working-directory: ${{ env.GENERATED_PROJECT_DIR }}/${{ env.GENERATED_PROJECT_NAME }}
              run: |
                  if [ -f django.pid ]; then
                    kill "$(cat django.pid)" || true
                  fi

            - name: Build production image
              working-directory: ${{ env.GENERATED_PROJECT_DIR }}
              run: docker build -f docker/Dockerfile.prod .
